<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DB Blueprint — ER Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8e8f0;--text2:#8888a8;--text3:#4a4a68;--accent:#6c63ff;--accent2:#a78bfa;--glow:rgba(108,99,255,0.18);--green:#22d3a0;--gdim:rgba(34,211,160,0.12);--amber:#f59e0b;--red:#f87171;--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:10}
.topbar h1{font-size:15px;font-weight:800}.topbar h1 span{color:var(--accent2)}
.tb-actions{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn:hover{background:var(--bg4)}.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.back{font-size:12px;color:var(--text3);text-decoration:none;font-family:'JetBrains Mono',monospace;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.back:hover{color:var(--text);border-color:var(--border2)}
.layout{flex:1;overflow:hidden;display:flex}
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-h{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.sb-body{flex:1;overflow-y:auto;padding:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field select,.field input{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
.field select:focus,.field input:focus{border-color:var(--accent)}.field select option{background:var(--bg3)}
.filter-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;transition:background .15s}
.filter-item:hover{background:var(--bg3)}.filter-item input[type=checkbox]{accent-color:var(--accent)}
.conf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow:hidden;position:relative;background:var(--bg)}
.erd-container{width:100%;height:100%;overflow:auto;padding:24px;display:flex;align-items:flex-start;justify-content:center}
.erd-container svg{max-width:none}
.placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;text-align:center;padding:40px;flex-direction:column;gap:16px}
.legend{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
@keyframes spin{to{transform:rotate(360deg)}}.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>
<div class="topbar">
  <span>📐</span><h1>ER <span>Diagram</span></h1>
  <div class="tb-actions">
    <button class="btn" onclick="exportSVG()">⬇ SVG</button>
    <button class="btn" onclick="exportMmd()">⬇ .mmd</button>
    <a href="/" class="back">← Dashboard</a>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-h">Source</div>
    <div class="sb-body">
      <div class="field"><label>Profile</label>
        <select id="prof-sel" onchange="loadDiagram()"><option value="">Select profile…</option></select>
      </div>
      <div class="field"><label>Show relations</label></div>
      <div class="legend">
        <label class="filter-item"><input type="checkbox" id="show-explicit" checked onchange="render()"> <span class="conf-dot" style="background:var(--green)"></span> Explicit FKs</label>
        <label class="filter-item"><input type="checkbox" id="show-high" checked onchange="render()"> <span class="conf-dot" style="background:var(--accent2)"></span> High confidence</label>
        <label class="filter-item"><input type="checkbox" id="show-medium" checked onchange="render()"> <span class="conf-dot" style="background:var(--amber)"></span> Medium confidence</label>
        <label class="filter-item"><input type="checkbox" id="show-low" onchange="render()"> <span class="conf-dot" style="background:var(--red)"></span> Low confidence</label>
      </div>
      <div style="margin-top:16px" class="field">
        <label>Filter tables</label>
        <input id="tbl-filter" placeholder="e.g. order, user…" oninput="render()">
      </div>
      <div style="margin-top:8px" id="table-list"></div>
    </div>
  </div>
  <div class="main">
    <div id="placeholder" class="placeholder">
      <span style="font-size:40px">📐</span>
      <span>Select a profile and load a blueprint to view the ER diagram.<br><br>Run <a href="/blueprint" style="color:var(--accent2)">Blueprint analysis</a> first to generate schema data.</span>
    </div>
    <div class="erd-container" id="erd-wrap" style="display:none"></div>
  </div>
</div>

<script>
let blueprintData=null, mmdCode='';

mermaid.initialize({startOnLoad:false,theme:'dark',fontFamily:'JetBrains Mono,monospace',
  themeVariables:{darkMode:true,fontSize:'12px',lineColor:'#555577',textColor:'#a0a0c0'}});

async function init(){
  const d=await(await fetch('/api/profiles')).json();
  const sel=document.getElementById('prof-sel');
  sel.innerHTML='<option value="">Select profile…</option>'+d.profiles.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  const pid=new URLSearchParams(location.search).get('profile');
  if(pid){sel.value=pid;loadDiagram();}
}

async function loadDiagram(){
  const pid=document.getElementById('prof-sel').value; if(!pid)return;
  document.getElementById('placeholder').innerHTML='<span class="spinner"></span><span>Extracting schema…</span>';
  try{
    const r=await fetch('/api/extract/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_id:pid,use_cache:true})});
    const d=await r.json();
    if(!d.ok)throw new Error(d.detail||'Extract failed');
    // Also run dedup for inferred relations
    const dr=await fetch('/api/dedup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schema:d.schema})});
    const dd=await dr.json();
    blueprintData={schema:d.schema,dedup:dd};
    buildTableList(Object.keys(d.schema.tables||{}));
    render();
  }catch(e){document.getElementById('placeholder').innerHTML=`<span style="color:var(--red)">Error: ${e.message}</span>`;}
}

function buildTableList(tables){
  document.getElementById('table-list').innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Tables (${tables.length})</div>`+
    tables.map(t=>`<label class="filter-item"><input type="checkbox" class="tbl-cb" value="${t}" checked onchange="render()"> ${t}</label>`).join('');
}

async function render(){
  if(!blueprintData)return;
  const showEx=document.getElementById('show-explicit').checked;
  const showH=document.getElementById('show-high').checked;
  const showM=document.getElementById('show-medium').checked;
  const showL=document.getElementById('show-low').checked;
  const filt=document.getElementById('tbl-filter').value.toLowerCase();
  const activeTbls=new Set([...document.querySelectorAll('.tbl-cb:checked')].map(c=>c.value));

  const schema=blueprintData.schema; const dedup=blueprintData.dedup;
  const tables=Object.entries(schema.tables||{}).filter(([n])=>activeTbls.has(n)&&(!filt||n.includes(filt)));

  let mmd='erDiagram\n';
  tables.forEach(([name,t])=>{
    mmd+=`  ${name} {\n`;
    (t.columns||[]).slice(0,10).forEach(c=>{
      const type=c.data_type?.replace(/[^a-zA-Z0-9_]/g,'_')||'string';
      mmd+=`    ${type} ${c.column_name}${c.is_pk?' PK':''}\n`;
    });
    mmd+='  }\n';
  });

  const tblSet=new Set(tables.map(([n])=>n));
  // Explicit FKs
  if(showEx)(schema.explicit_fks||[]).filter(r=>tblSet.has(r.from_table)&&tblSet.has(r.to_table))
    .forEach(r=>{mmd+=`  ${r.from_table} }o--|| ${r.to_table} : "${r.from_col}"\n`;});
  // Inferred FKs from dedup
  const fks=dedup?.inferred_fks||[];
  fks.filter(r=>tblSet.has(r.from_table)&&tblSet.has(r.to_table)).forEach(r=>{
    if(r.confidence==='high'&&showH)   mmd+=`  ${r.from_table} }o--|| ${r.to_table} : "~${r.from_col}"\n`;
    if(r.confidence==='medium'&&showM) mmd+=`  ${r.from_table} }o--o| ${r.to_table} : "~${r.from_col}"\n`;
    if(r.confidence==='low'&&showL)    mmd+=`  ${r.from_table} }o--o{ ${r.to_table} : "~${r.from_col}"\n`;
  });

  mmdCode=mmd;
  document.getElementById('placeholder').style.display='none';
  document.getElementById('erd-wrap').style.display='flex';
  try{
    const {svg}=await mermaid.render('erd-'+Date.now(),mmd);
    document.getElementById('erd-wrap').innerHTML=svg;
  }catch(e){
    document.getElementById('erd-wrap').innerHTML=`<pre style="color:var(--red);font-size:11px;padding:20px">${e.message}</pre>`;
  }
}

function exportSVG(){
  const svg=document.getElementById('erd-wrap').querySelector('svg');
  if(!svg)return;
  const blob=new Blob([svg.outerHTML],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='erd.svg';a.click();
}
function exportMmd(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([mmdCode],{type:'text/plain'}));a.download='diagram.mmd';a.click();
}

init();
</script>
</body>
</html>
