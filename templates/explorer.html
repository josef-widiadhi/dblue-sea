<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DB Blueprint — Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8e8f0;--text2:#8888a8;--text3:#4a4a68;--accent:#6c63ff;--accent2:#a78bfa;--glow:rgba(108,99,255,0.18);--green:#22d3a0;--gdim:rgba(34,211,160,0.12);--amber:#f59e0b;--adim:rgba(245,158,11,0.12);--red:#f87171;--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:10}
.topbar h1{font-size:15px;font-weight:800}.topbar h1 span{color:var(--accent2)}
.back{margin-left:auto;font-size:12px;color:var(--text3);text-decoration:none;font-family:'JetBrains Mono',monospace;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.back:hover{color:var(--text);border-color:var(--border2)}
.layout{display:flex;flex:1;overflow:hidden}
/* Pane 1: tree */
.tree-pane{width:260px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pane-h{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.pane-h .rr{cursor:pointer;color:var(--accent2);font-size:12px}
.tree-scroll{flex:1;overflow-y:auto;padding:8px 0}
.profile-select{padding:10px 14px;border-bottom:1px solid var(--border)}
.profile-select select{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
.tree-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:13px;transition:background .15s;border-left:2px solid transparent}
.tree-item:hover{background:var(--bg3)}.tree-item.active{background:var(--bg3);border-left-color:var(--accent)}
.tree-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center;color:var(--text3)}
.tree-label{font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-count{margin-left:auto;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;background:var(--bg4);padding:2px 6px;border-radius:10px}
.tree-search{padding:8px 14px;border-bottom:1px solid var(--border)}
.tree-search input{width:100%;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
/* Pane 2: detail */
.detail-pane{width:380px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.detail-scroll{flex:1;overflow-y:auto;padding:16px}
.detail-placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;text-align:center;padding:40px}
.tbl-header{margin-bottom:16px}
.tbl-name{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--accent2);margin-bottom:4px}
.tbl-meta{font-size:12px;color:var(--text3);display:flex;gap:14px}
.section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
.col-row{display:grid;grid-template-columns:1fr 100px 24px;gap:8px;padding:8px 10px;border-radius:6px;font-size:12px;border-bottom:1px solid var(--border);align-items:center}
.col-row:last-child{border-bottom:none}
.col-name{font-family:'JetBrains Mono',monospace;color:var(--text)}
.col-type{font-family:'JetBrains Mono',monospace;color:var(--text3);font-size:11px}
.pk-badge{width:20px;height:20px;border-radius:4px;background:var(--adim);border:1px solid rgba(245,158,11,.3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber);font-weight:700}
.idx-item{padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:6px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2)}
/* Pane 3: samples */
.sample-pane{flex:1;overflow:hidden;display:flex;flex-direction:column}
.sample-scroll{flex:1;overflow:auto;padding:16px}
.sample-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'JetBrains Mono',monospace}
.sample-table th{padding:8px 12px;text-align:left;color:var(--text3);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
.sample-table td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sample-table tr:hover td{background:var(--bg3);color:var(--text)}
.sample-placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;padding:40px;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.empty{padding:20px;text-align:center;color:var(--text3);font-size:12px}
</style>
</head>
<body>
<div class="topbar"><span>🌳</span><h1>Schema <span>Explorer</span></h1><a href="/" class="back">← Dashboard</a></div>
<div class="layout">

  <!-- Pane 1: Tree -->
  <div class="tree-pane">
    <div class="profile-select">
      <select id="prof-sel" onchange="loadTables()"><option value="">Select a profile…</option></select>
    </div>
    <div class="tree-search"><input id="tree-search" placeholder="🔍 Filter tables…" oninput="filterTree()"></div>
    <div class="pane-h"><span>Tables</span><span class="rr" onclick="loadTables()">↺</span></div>
    <div class="tree-scroll" id="tree"></div>
  </div>

  <!-- Pane 2: Detail -->
  <div class="detail-pane">
    <div class="pane-h"><span id="detail-title">Table detail</span></div>
    <div class="detail-scroll" id="detail"><div class="detail-placeholder">← Select a table to inspect its columns, indexes, and row count</div></div>
  </div>

  <!-- Pane 3: Sample data -->
  <div class="sample-pane">
    <div class="pane-h"><span id="sample-title">Sample data</span>
      <span id="sample-count" style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3)"></span>
    </div>
    <div class="sample-scroll" id="sample"><div class="sample-placeholder">← Select a table to preview sample rows</div></div>
  </div>

</div>

<script>
let allTables=[], currentProfile=null;

async function init(){
  const d=await(await fetch('/api/profiles')).json();
  const sel=document.getElementById('prof-sel');
  sel.innerHTML='<option value="">Select a profile…</option>'+d.profiles.map(p=>`<option value="${p.id}">${p.name} (${p.db_type})</option>`).join('');
  const pid=new URLSearchParams(location.search).get('profile');
  if(pid){sel.value=pid;loadTables();}
}

async function loadTables(){
  const pid=document.getElementById('prof-sel').value;
  if(!pid)return; currentProfile=pid;
  const tree=document.getElementById('tree');
  tree.innerHTML='<div class="empty"><span class="spinner"></span> Loading…</div>';
  try{
    const d=await(await fetch('/api/explorer/tables',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_id:pid})})).json();
    allTables=d.tables||[];
    renderTree(allTables);
  }catch(e){tree.innerHTML=`<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`;}
}

function renderTree(tables){
  const tree=document.getElementById('tree');
  if(!tables.length){tree.innerHTML='<div class="empty">No tables found</div>';return;}
  tree.innerHTML=tables.map(t=>`<div class="tree-item" onclick="selectTable('${t}')"><span class="tree-icon">📋</span><span class="tree-label" title="${t}">${t}</span></div>`).join('');
}

function filterTree(){
  const q=document.getElementById('tree-search').value.toLowerCase();
  renderTree(allTables.filter(t=>t.toLowerCase().includes(q)));
}

async function selectTable(table){
  // Mark active
  document.querySelectorAll('.tree-item').forEach(el=>{
    el.classList.toggle('active',el.querySelector('.tree-label')?.textContent===table);
  });
  document.getElementById('detail-title').textContent=table;
  document.getElementById('sample-title').textContent=`${table} — samples`;
  document.getElementById('detail').innerHTML='<div class="detail-placeholder"><span class="spinner"></span></div>';
  document.getElementById('sample').innerHTML='<div class="sample-placeholder"><span class="spinner"></span></div>';

  // Parallel load
  const [det,smp]=await Promise.all([
    fetch('/api/explorer/table-detail',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_id:currentProfile,table})}).then(r=>r.json()),
    fetch('/api/explorer/sample',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_id:currentProfile,table,limit:20})}).then(r=>r.json()),
  ]);
  renderDetail(det);
  renderSamples(smp.rows||[]);
}

function renderDetail(d){
  const el=document.getElementById('detail');
  const pks=d.columns?.filter(c=>c.is_pk).length||0;
  const nul=d.columns?.filter(c=>c.nullable==='YES').length||0;
  el.innerHTML=`
    <div class="tbl-header">
      <div class="tbl-name">${d.table}</div>
      <div class="tbl-meta">
        <span>📊 ${(d.row_count||0).toLocaleString()} rows</span>
        <span>🔑 ${pks} PK</span>
        <span>⬜ ${nul} nullable</span>
        <span>📐 ${d.columns?.length||0} cols</span>
      </div>
    </div>
    <div class="section-lbl" style="margin-bottom:8px">Columns</div>
    <div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px">
      ${(d.columns||[]).map(c=>`
        <div class="col-row">
          <span class="col-name">${c.name}${c.is_pk?' <span style="color:var(--amber);font-size:10px">PK</span>':''}</span>
          <span class="col-type">${c.type||''}</span>
          <span>${c.is_pk?'<div class="pk-badge">PK</div>':c.nullable==='NO'?'<span style="color:var(--red);font-size:10px">NN</span>':''}</span>
        </div>`).join('')}
    </div>
    ${d.indexes?.length?`
    <div class="section-lbl">Indexes</div>
    ${d.indexes.map(i=>`<div class="idx-item">${i.name}</div>`).join('')}`:''}`;
}

function renderSamples(rows){
  const el=document.getElementById('sample');
  document.getElementById('sample-count').textContent=`${rows.length} rows`;
  if(!rows.length){el.innerHTML='<div class="sample-placeholder">No sample data available</div>';return;}
  const cols=Object.keys(rows[0]);
  el.innerHTML=`<table class="sample-table">
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td title="${String(r[c]||'').replace(/"/g,'&quot;')}">${r[c]??'<span style="color:var(--text3)">NULL</span>'}</td>`).join('')}</tr>`).join('')}
    </tbody></table>`;
}

init();
</script>
</body>
</html>
